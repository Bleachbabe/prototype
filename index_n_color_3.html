
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artists</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wdth,wght@8..144,25..151,100..900&display=swap" rel="stylesheet">
  <style>

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #fff;
      overflow: hidden;
      font-family: 'Roboto Flex', 'Arial Black', Helvetica, sans-serif;
    }

    /* ── Snap scroll container ── */
    .scroll-container {
      width: 100%;
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
    }
    .scroll-container::-webkit-scrollbar { display: none; }

    /* ── Individual artist slides ── */
    .slide {
      height: clamp(70px, 10vw, 140px);
      display: flex;
      align-items: center;
      justify-content: center;
      scroll-snap-align: center;
    }

    /* Padding slides so first/last name can reach center */
    .slide-spacer {
      height: 50vh;
      scroll-snap-align: none;
    }

    .artist-name {
      font-family: 'Roboto Flex', 'Arial Black', Helvetica, sans-serif;
      font-weight: 700;
      font-variation-settings:
        'wdth' 101,   /* width:         25 (ultra condensed) → 151 (ultra wide) */
        'opsz' 90,    /* optical size:  8 (small) → 144 (large, match px size)  */
        'GRAD' 150,     /* grade:         -200 (lighter) → 150 (darker/heavier)   */
        'slnt' 0,     /* slant:         -10 (italic) → 0 (upright)              */
        'XTRA' 468,   /* counter width: 323 (narrow) → 603 (wide)               */
        'XOPQ' 96,    /* thick stroke:  27 (thin) → 175 (thick)                 */
        'YOPQ' 79,    /* thin stroke:   25 (thin) → 135 (thick)                 */
        'YTLC' 514,   /* lowercase ht:  416 (low) → 570 (tall)                  */
        'YTUC' 712,   /* uppercase ht:  528 (low) → 760 (tall)                  */
        'YTDE' -203,  /* descender:     -305 (deep) → -98 (shallow)             */
        'YTAS' 750,   /* ascender ht:   649 (low) → 854 (tall)                  */
        'YTFI' 738;   /* figure ht:     560 (low) → 788 (tall)                  */
      font-size: clamp(72px, 14vw, 220px);
      color: #000;
      white-space: nowrap;
      line-height: 1;
      /* Vertical compression */
      transform: scaleY(0.58);
      transform-origin: center center;
      display: block;
      /* Soft contour / outline */
      text-shadow:
        0   0   6px rgba(0,0,0,0.55),
        1px 2px 6px rgba(0,0,0,0.30),
       -1px 2px 6px rgba(0,0,0,0.30);
      -webkit-text-stroke: 0.5px rgba(0,0,0,0.4);
    }

    /* ── Top nav ── */
    .nav {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      z-index: 300;
      transition: transform 0.3s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 14px 0 12px;
      gap: clamp(16px, 3vw, 48px);
    }
    .nav a {
      font-family: 'Roboto Flex', 'Arial Black', Helvetica, sans-serif;
      font-weight: 900;
      font-size: clamp(14px, 1.8vw, 26px);
      text-decoration: none;
      letter-spacing: 0.08em;
      mix-blend-mode: difference;
      color: #c8c8c8;
      text-shadow: 0 0 8px rgba(255,255,255,0.9), 0 0 18px rgba(255,255,255,0.5);
    }
    .nav a:hover { opacity: 0.6; }

    .nav::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 110px;
      z-index: -1;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      background: linear-gradient(to bottom, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0.1) 70%, transparent 100%);
      pointer-events: none;
    }

    /* Hide menu trigger and menu entirely on desktop */
    #mobileTrigger { display: none; }
    #mobile-menu { display: none; }

    @media (max-width: 768px) {
      .nav a { display: none; }
      #mobile-menu { display: flex; }
      #mobileTrigger {
        display: block;
        font-size: clamp(18px, 6vw, 28px);
        mix-blend-mode: difference;
        color: #c8c8c8;
        text-shadow: 0 0 8px rgba(255,255,255,0.9), 0 0 18px rgba(255,255,255,0.5);
      }
      .nav { justify-content: center; }
      .nav::before { display: none; }
    }

    /* Slide-down mobile menu */
    #mobile-menu {
      position: fixed;
      top: 0; left: 0; width: 100%; height: calc(65vh + 48px);
      z-index: 200;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 90px;
      gap: clamp(4px, 1.2vh, 12px);
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      -webkit-mask-image: linear-gradient(to bottom, black 75%, transparent 100%);
      mask-image: linear-gradient(to bottom, black 75%, transparent 100%);
      transform: translateY(calc(-100% - 40px));
      transition: transform 0.4s cubic-bezier(0.25, 0, 0, 1);
      pointer-events: none;
    }
    #mobile-menu.open {
      transform: translateY(0);
      pointer-events: auto;
    }
    #mobile-menu a {
      font-family: 'Roboto Flex', 'Arial Black', Helvetica, sans-serif;
      font-weight: 900;
      font-size: clamp(24px, 7vw, 48px);
      text-decoration: none;
      letter-spacing: 0.06em;
      color: #c8c8c8;
      mix-blend-mode: difference;
      transform: scaleY(0.62);
      transform-origin: center center;
      display: block;
      transition: opacity 0.2s;
    }
    #mobile-menu a:hover,
    #mobile-menu a:active { opacity: 0.5; }
    #mobile-menu-close {
      position: absolute;
      top: 10px; right: 14px;
      background: none; border: none;
      cursor: pointer; color: #fff;
      font-size: 20px; font-weight: 900;
      opacity: 0.6; padding: 4px 8px;
    }
    #mobile-menu-close:hover { opacity: 1; }

    /* ── Icon buttons ── */
    .icon-btn {
      position: fixed;
      top: 14px;
      z-index: 310;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      line-height: 0;
      color: #fff;
      mix-blend-mode: difference;
      -webkit-tap-highlight-color: transparent;
    }
    #readableToggle { right: 16px; }
    #soundToggle    { left: 16px; }
    .icon-btn .cross-line {
      stroke-dasharray: 32;
      stroke-dashoffset: 32;
      transition: stroke-dashoffset 0.28s ease;
    }
    .icon-btn.off .cross-line { stroke-dashoffset: 0; }

    /* ── Fixed grey oval overlay ── */
    .brush {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 10;
      mix-blend-mode: difference;
      background: linear-gradient(to bottom, #fff 0%, #313131 25%, #fffee9 50%, #313131 75%, #fff 100%);
    }

    /* Ensure scroll container and slides sit above bg */
    .scroll-container { position: relative; z-index: 1; height: calc(100vh - 50px); }

    /* ── Slide-up drum panel ── */
    #drum-panel {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%;
      height: 60vh;
      z-index: 400;
      display: flex;
      flex-direction: column;
      transform: translateY(calc(60vh - 50px));
      transition: transform 0.45s cubic-bezier(0.25, 0, 0, 1);
    }
    #drum-panel.open { transform: translateY(0); }

    /* ── Track recorder bar ── */
    .trackbar {
      flex-shrink: 0;
      height: 50px;
      background: #e8e8e8;
      border-top: 1px solid #ccc;
      display: flex;
      align-items: center;
      gap: 0;
      font-family: -apple-system, 'Segoe UI', monospace, sans-serif;
    }

    /* Panel toggle button */
    #panel-toggle {
      flex: 0 0 44px;
      height: 100%;
      background: none;
      border: none;
      border-left: 1px solid #ccc;
      color: #999;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s;
      line-height: 1;
    }
    #panel-toggle:hover { color: #333; }

    /* ── Beats area ── */
    #beats-area {
      flex: 1;
      background: #f0f0f0;
      border-top: 1px solid #d8d8d8;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .beats-save-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid #ddd;
      flex-shrink: 0;
    }
    #beat-name-input {
      flex: 1;
      background: #fff;
      border: 1px solid #ccc;
      color: #333;
      font-family: -apple-system, 'Segoe UI', monospace;
      font-size: 12px;
      padding: 6px 10px;
      outline: none;
    }
    #beat-name-input::placeholder { color: #bbb; }
    #beat-name-input:focus { border-color: #999; }
    #save-beat-btn {
      background: none;
      border: 1px solid #bbb;
      color: #888;
      font-family: -apple-system, 'Segoe UI', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 6px 14px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    #save-beat-btn:hover { color: #111; border-color: #666; }
    #beats-list {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #ccc transparent;
    }
    .beat-entry {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-bottom: 1px solid #e4e4e4;
      transition: background 0.12s;
    }
    .beat-entry:hover { background: #e8e8e8; }
    .beat-entry-info { flex: 1; min-width: 0; }
    .beat-entry-name {
      display: block;
      font-family: -apple-system, 'Segoe UI', monospace;
      font-size: 11px;
      font-weight: 700;
      color: #333;
      letter-spacing: 0.04em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .beat-entry-meta {
      display: block;
      font-family: -apple-system, 'Segoe UI', monospace;
      font-size: 9px;
      color: #aaa;
      margin-top: 2px;
    }
    .beat-entry-steps {
      display: flex;
      gap: 2px;
      flex-shrink: 0;
    }
    .step-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #ccc;
    }
    .step-dot.on { background: #ff6a00; }
    .beat-action-btn {
      background: none;
      border: 1px solid #ccc;
      color: #999;
      font-family: -apple-system, monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 4px 8px;
      cursor: pointer;
      flex-shrink: 0;
      transition: color 0.12s, border-color 0.12s;
    }
    .beat-action-btn:hover { color: #111; border-color: #888; }
    .beat-del-btn:hover { color: #ff4444 !important; border-color: #ff4444 !important; }

    .trackbar-btn {
      flex: 0 0 50px;
      height: 100%;
      background: none;
      border: none;
      border-right: 1px solid #ccc;
      color: #777;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s;
    }
    .trackbar-btn:hover { background: #ddd; color: #111; }
    .trackbar-btn.playing { color: #ff6a00; }

    #clear-btn {
      font-size: 12px;
      border-right: none;
      border-left: 1px solid #ccc;
      color: #aaa;
    }
    #clear-btn:hover { color: #ff4444; background: #ddd; }

    #track-lane {
      flex: 1;
      height: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      position: relative;
      display: flex;
      align-items: center;
      padding: 0 8px;
      gap: 3px;
    }
    #track-lane::-webkit-scrollbar { display: none; }

    .beat-chip {
      flex: 0 0 38px;
      height: 32px;
      border-radius: 3px;
      background: #ddd;
      border: 1px solid #c8c8c8;
      color: #999;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.08s, color 0.08s, border-color 0.08s;
      user-select: none;
    }
    .beat-chip.active {
      background: #ff6a00;
      border-color: #ff8533;
      color: #fff;
    }
    .beat-chip { cursor: grab; }
    .beat-chip.filled { border-color: #aaa; color: #444; }
    .beat-chip.head { border-top: 2px solid #888; }
    .beat-chip.dragging { opacity: 0.35; cursor: grabbing; }
    .beat-chip.drag-over { border-color: #333; background: #bbb; color: #111; }

    #step-count {
      flex: 0 0 36px;
      font-size: 10px;
      color: #999;
      text-align: center;
      border-left: 1px solid #ccc;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── FX sliders (desktop only) ── */
    .fx-sliders {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      border-left: 1px solid #ccc;
      border-right: 1px solid #ccc;
      height: 100%;
    }
    .fx-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      font-family: -apple-system, 'Segoe UI', monospace, sans-serif;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #999;
    }
    .fx-label input[type=range] {
      width: 52px;
      accent-color: #ff6a00;
      cursor: pointer;
      margin: 0;
      padding: 0;
    }
    @media (max-width: 768px) { .fx-sliders { display: none; } }

    /* ── Tempo slider ── */
    .tempo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 0 12px;
      border-left: 1px solid #ccc;
      height: 100%;
      justify-content: center;
      font-family: -apple-system, 'Segoe UI', monospace, sans-serif;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #009aaa;
    }
    .tempo-wrap input[type=range] {
      width: 110px;
      accent-color: #009aaa;
      cursor: pointer;
      margin: 0; padding: 0;
    }
    @media (max-width: 768px) { .tempo-wrap { display: none; } }

    /* Linked artist names */
    .artist-link {
      text-decoration: none;
      color: inherit;
      cursor: pointer;
    }
    .artist-link:hover { opacity: 0.6; }

    /* ── Simple mode ── */
    body.simple .brush { display: none; }
    body.simple { background: #fff; }
    body.simple .scroll-container {
      scroll-snap-type: none;
      overflow-y: scroll;
    }
    body.simple .slide {
      height: auto;
      padding: 6px 0;
      scroll-snap-align: none;
    }
    body.simple .slide-spacer { height: 80px; }
    body.simple .artist-name {
      transform: scaleY(0.58);
      font-size: clamp(72px, 14vw, 220px);
      color: #000;
      text-shadow: none;
      -webkit-text-stroke: 0;
    }
  </style>
</head>

  <script>
    const container = document.querySelector('.scroll-container');
    const slides    = Array.from(document.querySelectorAll('.slide'));

    let currentImg  = null;
    let soundMode   = localStorage.getItem('soundMode') !== '0';

    // ── Track recorder state ──
    let stepSec = 0.15;
    const MAX_STEPS = window.innerWidth <= 768 ? 8 : 16;
    const soundLabels = {
      1:'SNRA', 2:'KICK', 3:'HHAT', 4:'CLAP', 5:'TOM+',
      6:'TOM-', 7:'OHAT', 8:'RIM',  9:'808',  10:'SHK2',
      11:'CRSH', 12:'CLAV', 13:'SNRB', 14:'SHKR', 15:'PERC', 16:'SUB'
    };
    let sequence   = new Array(MAX_STEPS).fill(0); // 0 = empty
    let chips      = [];
    let recordHead = 0;
    let isPlaying      = false;
    let schedulerTimer = null;
    let currentStep    = 0;
    let nextStepTime   = 0;

    // ── Audio synthesis ──────────────────────────────────────────────
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // ── Master effects chain ──────────────────────────────────────────
    const masterInput = audioCtx.createGain();

    function makeSatCurve(amount) {
      const n = 256, curve = new Float32Array(n);
      const k = Math.max(amount * 120, 0.001);
      for (let i = 0; i < n; i++) {
        const x = (i * 2) / n - 1;
        curve[i] = (Math.PI + k) * x / (Math.PI + k * Math.abs(x));
      }
      return curve;
    }

    const satNode = audioCtx.createWaveShaper();
    satNode.curve = makeSatCurve(0);
    satNode.oversample = '4x';

    const satComp = audioCtx.createGain(); // loudness compensation
    satComp.gain.value = 1;

    const dryGain = audioCtx.createGain();
    dryGain.gain.value = 1;

    // Delay
    const delayNode = audioCtx.createDelay(2.0);
    delayNode.delayTime.value = 0.3;
    const delayFeedback = audioCtx.createGain();
    delayFeedback.gain.value = 0.5;
    const delayWet = audioCtx.createGain();
    delayWet.gain.value = 0;

    // Ring modulation
    const ringCarrier = audioCtx.createOscillator();
    ringCarrier.frequency.value = 180;
    ringCarrier.type = 'sine';
    const ringModGain = audioCtx.createGain();
    ringModGain.gain.value = 0;
    ringCarrier.connect(ringModGain.gain);
    ringCarrier.start();
    const ringWet = audioCtx.createGain();
    ringWet.gain.value = 0;

    masterInput.connect(satNode);
    satNode.connect(satComp);
    satComp.connect(dryGain);
    dryGain.connect(audioCtx.destination);
    satComp.connect(delayWet);
    delayWet.connect(delayNode);
    delayNode.connect(audioCtx.destination);
    delayNode.connect(delayFeedback);
    delayFeedback.connect(delayNode);
    satComp.connect(ringModGain);
    ringModGain.connect(ringWet);
    ringWet.connect(audioCtx.destination);
    // ── End master effects chain ──────────────────────────────────────

    function noise(duration, filter = null, filterFreq = 2000, gain = 0.6) {
      const buf  = audioCtx.createBuffer(1, audioCtx.sampleRate * duration, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      const g = audioCtx.createGain();
      if (filter) {
        const f = audioCtx.createBiquadFilter();
        f.type = filter; f.frequency.value = filterFreq;
        src.connect(f); f.connect(g);
      } else {
        src.connect(g);
      }
      g.connect(masterInput);
      return { src, gain: g };
    }

    function osc(freq, type = 'sine') {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = type; o.frequency.value = freq;
      o.connect(g); g.connect(masterInput);
      return { osc: o, gain: g };
    }

    function env(gainNode, peak, decay, t) {
      gainNode.gain.setValueAtTime(peak, t);
      gainNode.gain.exponentialRampToValueAtTime(0.0001, t + decay);
    }

    const sounds = {
      1:  (t) => { // Snare A
            const { src, gain: g } = noise(0.2, 'bandpass', 800, 0.7);
            env(g, 0.7, 0.18, t); g.gain.setValueAtTime(0.7, t); src.start(t); src.stop(t + 0.2);
            const { osc: o, gain: og } = osc(200); env(og, 0.4, 0.08, t); o.start(t); o.stop(t + 0.1);
          },
      2:  (t) => { // Kick
            const { osc: o, gain: g } = osc(60);
            o.frequency.setValueAtTime(160, t); o.frequency.exponentialRampToValueAtTime(40, t + 0.1);
            env(g, 0.9, 0.3, t); o.start(t); o.stop(t + 0.35);
          },
      3:  (t) => { // Closed hi-hat
            const { src, gain: g } = noise(0.08, 'highpass', 8000, 0.4);
            env(g, 0.4, 0.05, t); g.gain.setValueAtTime(0.4, t); src.start(t); src.stop(t + 0.08);
          },
      4:  (t) => { // Clap
            [0, 0.01, 0.02].forEach(offset => {
              const { src, gain: g } = noise(0.07, 'bandpass', 1200, 0.5);
              g.gain.setValueAtTime(0.5, t + offset);
              g.gain.exponentialRampToValueAtTime(0.0001, t + offset + 0.06);
              src.start(t + offset); src.stop(t + offset + 0.07);
            });
          },
      5:  (t) => { // Tom high
            const { osc: o, gain: g } = osc(320);
            o.frequency.setValueAtTime(320, t); o.frequency.exponentialRampToValueAtTime(180, t + 0.15);
            env(g, 0.7, 0.2, t); o.start(t); o.stop(t + 0.25);
          },
      6:  (t) => { // Tom low
            const { osc: o, gain: g } = osc(100);
            o.frequency.setValueAtTime(100, t); o.frequency.exponentialRampToValueAtTime(55, t + 0.2);
            env(g, 0.8, 0.3, t); o.start(t); o.stop(t + 0.35);
          },
      7:  (t) => { // Open hi-hat
            const { src, gain: g } = noise(0.4, 'highpass', 7000, 0.35);
            env(g, 0.35, 0.35, t); g.gain.setValueAtTime(0.35, t); src.start(t); src.stop(t + 0.4);
          },
      8:  (t) => { // Rim shot
            const { osc: o, gain: g } = osc(900, 'triangle');
            env(g, 0.6, 0.04, t); o.start(t); o.stop(t + 0.05);
            const { src, gain: ng } = noise(0.04, 'bandpass', 1800, 0.3);
            env(ng, 0.3, 0.03, t); ng.gain.setValueAtTime(0.3, t); src.start(t); src.stop(t + 0.04);
          },
      9:  (t) => { // 808 kick
            const { osc: o, gain: g } = osc(55);
            o.frequency.setValueAtTime(200, t); o.frequency.exponentialRampToValueAtTime(40, t + 0.15);
            env(g, 1.0, 0.6, t); o.start(t); o.stop(t + 0.7);
          },
      10: (t) => { // Shaker alt
            const { src, gain: g } = noise(0.05, 'bandpass', 6000, 0.2);
            env(g, 0.2, 0.04, t); g.gain.setValueAtTime(0.2, t); src.start(t); src.stop(t + 0.05);
          },
      11: (t) => { // Crash
            const { src, gain: g } = noise(1.0, 'highpass', 5000, 0.3);
            g.gain.setValueAtTime(0.3, t); g.gain.exponentialRampToValueAtTime(0.0001, t + 1.0);
            src.start(t); src.stop(t + 1.0);
          },
      12: (t) => { // Clave
            const { osc: o, gain: g } = osc(1400, 'sine');
            env(g, 0.7, 0.025, t); o.start(t); o.stop(t + 0.03);
          },
      13: (t) => { // Snare B (deeper)
            const { src, gain: g } = noise(0.25, 'bandpass', 500, 0.6);
            env(g, 0.6, 0.22, t); g.gain.setValueAtTime(0.6, t); src.start(t); src.stop(t + 0.25);
            const { osc: o, gain: og } = osc(120); env(og, 0.5, 0.1, t); o.start(t); o.stop(t + 0.12);
          },
      14: (t) => { // Shaker
            const { src, gain: g } = noise(0.06, 'bandpass', 5000, 0.25);
            env(g, 0.25, 0.05, t); g.gain.setValueAtTime(0.25, t); src.start(t); src.stop(t + 0.06);
          },
      15: (t) => { // Synth perc
            const { osc: o, gain: g } = osc(440, 'triangle');
            o.frequency.setValueAtTime(660, t); o.frequency.exponentialRampToValueAtTime(220, t + 0.12);
            env(g, 0.6, 0.15, t); o.start(t); o.stop(t + 0.2);
          },
      16: (t) => { // Deep sub kick
            const { osc: o, gain: g } = osc(40);
            o.frequency.setValueAtTime(120, t); o.frequency.exponentialRampToValueAtTime(30, t + 0.2);
            env(g, 1.0, 0.5, t); o.start(t); o.stop(t + 0.55);
          },
    };

    function playSample(imgNum) {
      if (!soundMode) return;
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const fn = sounds[parseInt(imgNum)];
      if (fn) fn(audioCtx.currentTime);
    }

    // ── End audio ────────────────────────────────────────────────────

    function setBackground(imgNum) {
      if (imgNum === currentImg) return;
      currentImg = imgNum;

      playSample(imgNum);
      recordBeat(imgNum);
    }

    let simpleMode = false;

    function update() {
      if (simpleMode) {
        slides.forEach(slide => slide.style.transform = '');
        return;
      }

      const vh      = container.clientHeight;
      const centerY = vh / 2;
      let   closest = null;
      let   closestDist = Infinity;

      slides.forEach((slide, i) => {
        const rect        = slide.getBoundingClientRect();
        const slideCenter = rect.top + rect.height / 2;
        const dist        = slideCenter - centerY;
        const absDist     = Math.abs(dist);

        if (absDist < closestDist) {
          closestDist = absDist;
          closest     = slide;
        }

        const t         = Math.min(absDist / (vh * 0.5), 1);
        const eased     = t * t;
        const direction = i % 2 === 0 ? 1 : -1;
        const angle     = eased * 42 * direction;
        const scale     = 1 + eased * 1;

        slide.style.transform = `perspective(700px) rotateY(${angle}deg) scale(${scale})`;
      });

      if (closest) {
        setBackground(closest.dataset.img);
      }
    }

    // ── Track recorder setup (must happen before update()) ───────────
    const playBtn   = document.getElementById('play-btn');
    const clearBtn  = document.getElementById('clear-btn');
    const lane      = document.getElementById('track-lane');
    const stepCount = document.getElementById('step-count');

    // Pre-create all fixed chip slots before update() fires
    document.getElementById('empty-label').remove();
    for (let i = 0; i < MAX_STEPS; i++) {
      const chip = document.createElement('div');
      chip.className = 'beat-chip';
      chip.textContent = '·';
      lane.appendChild(chip);
      chips.push(chip);
    }
    chips[0].classList.add('head');

    // ── Chip interaction: click to clear, drag to reorder ─────────────
    let dragSrcIdx = null;
    let dragMoved  = false;
    const DRAG_THRESH = 6;

    function clearStep(i) {
      sequence[i] = 0;
      chips[i].textContent = '·';
      chips[i].classList.remove('filled', 'active');
      stepCount.textContent = sequence.filter(s => s !== 0).length;
    }

    function refreshChip(i) {
      const n = sequence[i];
      chips[i].textContent = n ? (soundLabels[n] || n) : '·';
      chips[i].classList.toggle('filled', n !== 0);
    }

    function chipAtX(x) {
      for (let j = 0; j < chips.length; j++) {
        const r = chips[j].getBoundingClientRect();
        if (x >= r.left && x <= r.right) return j;
      }
      return null;
    }

    chips.forEach((chip, i) => {
      let startX = 0;

      chip.addEventListener('pointerdown', e => {
        dragSrcIdx = i;
        dragMoved  = false;
        startX     = e.clientX;
        chip.setPointerCapture(e.pointerId);
        e.preventDefault();
      });

      chip.addEventListener('pointermove', e => {
        if (dragSrcIdx !== i) return;
        if (Math.abs(e.clientX - startX) > DRAG_THRESH) {
          dragMoved = true;
          chip.classList.add('dragging');
          chips.forEach(c => c.classList.remove('drag-over'));
          const t = chipAtX(e.clientX);
          if (t !== null && t !== dragSrcIdx) chips[t].classList.add('drag-over');
        }
      });

      chip.addEventListener('pointerup', e => {
        if (dragSrcIdx !== i) return;
        chips.forEach(c => c.classList.remove('drag-over', 'dragging'));
        if (!dragMoved) {
          if (sequence[i] !== 0) clearStep(i);
        } else {
          const t = chipAtX(e.clientX);
          if (t !== null && t !== dragSrcIdx) {
            [sequence[dragSrcIdx], sequence[t]] = [sequence[t], sequence[dragSrcIdx]];
            refreshChip(dragSrcIdx);
            refreshChip(t);
            stepCount.textContent = sequence.filter(s => s !== 0).length;
          }
        }
        dragSrcIdx = null;
      });
    });
    // ── End chip interaction ───────────────────────────────────────────

    function recordBeat(imgNum) {
      const n = parseInt(imgNum);
      sequence[recordHead] = n;
      chips[recordHead].textContent = soundLabels[n] || n;
      chips[recordHead].classList.add('filled');
      chips[recordHead].classList.remove('head');
      recordHead = (recordHead + 1) % MAX_STEPS;
      chips[recordHead].classList.add('head');
      chips[recordHead].scrollIntoView({ inline: 'nearest', behavior: 'smooth' });
      stepCount.textContent = sequence.filter(s => s !== 0).length;
    }

    function highlightStep(i) {
      chips.forEach((c, j) => c.classList.toggle('active', j === i));
      if (chips[i]) chips[i].scrollIntoView({ inline: 'nearest', behavior: 'smooth' });
    }

    function scheduleStep() {
      if (!isPlaying) return;
      const LOOKAHEAD = 0.08;
      while (nextStepTime < audioCtx.currentTime + LOOKAHEAD) {
        const step = currentStep;
        const n = sequence[step];
        if (n !== 0) sounds[n]?.(nextStepTime);
        const delay = Math.max(0, (nextStepTime - audioCtx.currentTime) * 1000);
        setTimeout(() => { if (isPlaying) highlightStep(step); }, delay);
        currentStep = (currentStep + 1) % MAX_STEPS;
        nextStepTime += stepSec;
      }
      schedulerTimer = setTimeout(scheduleStep, 25);
    }

    function startPlay() {
      if (sequence.every(n => n === 0)) return;
      if (audioCtx.state === 'suspended') audioCtx.resume();
      isPlaying = true;
      currentStep = 0;
      nextStepTime = audioCtx.currentTime + 0.05;
      playBtn.textContent = '■';
      playBtn.classList.add('playing');
      scheduleStep();
    }

    function stopPlay() {
      isPlaying = false;
      clearTimeout(schedulerTimer);
      playBtn.textContent = '▶';
      playBtn.classList.remove('playing');
      chips.forEach(c => c.classList.remove('active'));
    }

    playBtn.addEventListener('click', () => { isPlaying ? stopPlay() : startPlay(); });
    clearBtn.addEventListener('click', () => {
      stopPlay();
      sequence.fill(0);
      recordHead = 0;
      chips.forEach((c, i) => {
        c.textContent = '·';
        c.classList.remove('filled', 'head', 'active');
        if (i === 0) c.classList.add('head');
      });
      stepCount.textContent = '0';
    });
    document.getElementById('tempo-slider').addEventListener('input', e => {
      stepSec = (100 + 400 - e.target.value) / 1000; // invert: right = faster
    });
    document.getElementById('delay-slider').addEventListener('input', e => {
      delayWet.gain.value = e.target.value / 100 * 0.8;
    });
    document.getElementById('sat-slider').addEventListener('input', e => {
      const amt = e.target.value / 100;
      satNode.curve = makeSatCurve(amt);
      satComp.gain.value = 1 / (1 + amt * 2.5);
    });
    document.getElementById('ring-slider').addEventListener('input', e => {
      ringWet.gain.value = e.target.value / 100 * 1.2;
    });
    // ── End track recorder ─────────────────────────────────────────────

    // ── Panel toggle ────────────────────────────────────────────────────
    const drumPanel   = document.getElementById('drum-panel');
    const panelToggle = document.getElementById('panel-toggle');

    panelToggle.addEventListener('click', () => {
      const open = drumPanel.classList.toggle('open');
      panelToggle.textContent = open ? '∧' : '∨';
    });

    // ── Beat save / load ─────────────────────────────────────────────────
    const BEATS_KEY   = 'backslash_beats';
    const beatsList   = document.getElementById('beats-list');
    const beatNameIn  = document.getElementById('beat-name-input');
    const saveBeatBtn = document.getElementById('save-beat-btn');

    function getBeats() {
      try { return JSON.parse(localStorage.getItem(BEATS_KEY)) || []; }
      catch { return []; }
    }
    function saveBeats(arr) {
      localStorage.setItem(BEATS_KEY, JSON.stringify(arr));
    }

    function formatTime(ts) {
      const d = new Date(ts);
      const date = `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getFullYear()).slice(2)}`;
      const time = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      return `${date} · ${time}`;
    }

    function renderBeats() {
      const beats = getBeats();
      beatsList.innerHTML = '';
      if (beats.length === 0) {
        beatsList.innerHTML = '<div style="padding:16px 12px;font-size:10px;color:#2a2a2a;font-family:monospace">no saved beats yet</div>';
        return;
      }
      beats.forEach((beat, idx) => {
        const entry = document.createElement('div');
        entry.className = 'beat-entry';

        // Steps preview dots
        const dotsEl = document.createElement('div');
        dotsEl.className = 'beat-entry-steps';
        beat.sequence.forEach(n => {
          const dot = document.createElement('div');
          dot.className = 'step-dot' + (n !== 0 ? ' on' : '');
          dotsEl.appendChild(dot);
        });

        // Info
        const info = document.createElement('div');
        info.className = 'beat-entry-info';
        info.innerHTML = `<span class="beat-entry-name">${beat.name}</span><span class="beat-entry-meta">${formatTime(beat.ts)}</span>`;

        // Load button
        const loadBtn = document.createElement('button');
        loadBtn.className = 'beat-action-btn';
        loadBtn.textContent = 'LOAD';
        loadBtn.addEventListener('click', e => {
          e.stopPropagation();
          stopPlay();
          sequence = [...beat.sequence];
          recordHead = 0;
          chips.forEach((c, i) => {
            const n = sequence[i];
            c.textContent = n ? (soundLabels[n] || n) : '·';
            c.classList.toggle('filled', n !== 0);
            c.classList.remove('active', 'head');
            if (i === 0) c.classList.add('head');
          });
          stepCount.textContent = sequence.filter(s => s !== 0).length;
          applyState(beat.fx);
          startPlay();
        });

        // Delete button
        const delBtn = document.createElement('button');
        delBtn.className = 'beat-action-btn beat-del-btn';
        delBtn.textContent = '✕';
        delBtn.addEventListener('click', e => {
          e.stopPropagation();
          const arr = getBeats();
          arr.splice(idx, 1);
          saveBeats(arr);
          renderBeats();
        });

        entry.appendChild(dotsEl);
        entry.appendChild(info);
        entry.appendChild(loadBtn);
        entry.appendChild(delBtn);
        beatsList.appendChild(entry);
      });
    }

    function captureState() {
      return {
        delay:  +document.getElementById('delay-slider').value,
        sat:    +document.getElementById('sat-slider').value,
        ring:   +document.getElementById('ring-slider').value,
        tempo:  +document.getElementById('tempo-slider').value,
      };
    }

    function applyState(fx) {
      if (!fx) return;
      document.getElementById('delay-slider').value = fx.delay;
      document.getElementById('sat-slider').value   = fx.sat;
      document.getElementById('ring-slider').value  = fx.ring;
      document.getElementById('tempo-slider').value = fx.tempo;
      delayWet.gain.value   = fx.delay / 100 * 0.8;
      const satAmt = fx.sat / 100;
      satNode.curve         = makeSatCurve(satAmt);
      satComp.gain.value    = 1 / (1 + satAmt * 2.5);
      ringWet.gain.value    = fx.ring / 100 * 1.2;
      stepSec               = (100 + 400 - fx.tempo) / 1000;
    }

    saveBeatBtn.addEventListener('click', () => {
      const name = beatNameIn.value.trim();
      if (!name) { beatNameIn.focus(); return; }
      const arr = getBeats();
      arr.unshift({ name, ts: Date.now(), sequence: [...sequence], fx: captureState() });
      saveBeats(arr);
      beatNameIn.value = '';
      renderBeats();
    });

    beatNameIn.addEventListener('keydown', e => {
      if (e.key === 'Enter') saveBeatBtn.click();
    });

    renderBeats();

    container.addEventListener('scroll', () => requestAnimationFrame(update), { passive: true });
    update();

    // ── Hide nav on scroll down, show on scroll up (mobile only) ──
    const nav = document.querySelector('.nav');
    let lastScrollY = container.scrollTop;
    container.addEventListener('scroll', () => {
      if (window.innerWidth > 768) return;
      const y = container.scrollTop;
      if (y < 10) {
        nav.style.transform = '';
      } else if (y > lastScrollY + 8) {
        if (!mobileMenu.classList.contains('open')) {
          nav.style.transform = 'translateY(-100%)';
        }
      } else if (y < lastScrollY - 8) {
        nav.style.transform = '';
      }
      lastScrollY = y;
    }, { passive: true });

    /* ── Mobile menu ── */
    const mobileMenu    = document.getElementById('mobile-menu');
    const mobileTrigger = document.getElementById('mobileTrigger');
    const mobileClose   = document.getElementById('mobile-menu-close');

    function updateTriggerLabel() {
      mobileTrigger.textContent = mobileMenu.classList.contains('open') ? '✕' : 'Menu';
    }

    mobileTrigger.addEventListener('click', e => {
      e.preventDefault();
      mobileMenu.classList.toggle('open');
      updateTriggerLabel();
    });
    mobileClose.addEventListener('click', () => { mobileMenu.classList.remove('open'); updateTriggerLabel(); });
    mobileMenu.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => {
        if (a.getAttribute('href') !== '#') { mobileMenu.classList.remove('open'); updateTriggerLabel(); }
      });
    });

    // Apply saved mode on load
    if (localStorage.getItem('simpleMode') === '1') {
      simpleMode = true;
      document.body.classList.add('simple');
      document.getElementById('readableToggle').classList.add('off');
      update();
    }

    document.getElementById('readableToggle').addEventListener('click', () => {
      simpleMode = !simpleMode;
      document.getElementById('readableToggle').classList.toggle('off', simpleMode);
      document.body.classList.toggle('simple', simpleMode);
      localStorage.setItem('simpleMode', simpleMode ? '1' : '0');
      update();
    });
    // Apply saved sound state on load
    if (!soundMode) {
      document.getElementById('soundToggle').classList.add('off');
      audioCtx.suspend();
    }

    document.getElementById('soundToggle').addEventListener('click', () => {
      soundMode = !soundMode;
      document.getElementById('soundToggle').classList.toggle('off', !soundMode);
      localStorage.setItem('soundMode', soundMode ? '1' : '0');
      if (!soundMode) audioCtx.suspend();
      else audioCtx.resume();
    });
  </script>

</body>
</html>
